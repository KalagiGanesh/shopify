<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Solvra</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="/" class="logo">Solvra</a>
                <ul class="nav-menu">
                    <li><a href="/products">Shop All</a></li>
                    <li><a href="/collections/best-sellers">Best Sellers</a></li>
                    <li><a href="/faq">FAQ</a></li>
                </ul>
                <a href="/cart" class="cart-icon">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <section class="cart-page">
        <div class="container">
            <div class="cart-content">
                <h1>Your Cart</h1>
                
                <div id="cart-items" class="cart-items">
                    <div class="cart-empty">
                        <p>Your cart is empty</p>
                        <a href="/products" class="btn btn-primary">Continue Shopping</a>
                    </div>
                </div>

                <div id="cart-summary" class="cart-summary" style="display: none;">
                    <div class="cart-total">
                        <h3>Total</h3>
                        <div class="total-amount">$0.00</div>
                    </div>
                    <button class="btn btn-primary btn-large" onclick="checkout()">
                        Proceed to Checkout
                    </button>
                    <div class="cart-trust">
                        <p>🔒 Secure checkout | Free shipping over $50</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Solvra. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/static/js/script.js"></script>
    <script>
        // Load cart from localStorage
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('solvraCart') || '[]');
            const cartItems = document.getElementById('cart-items');
            const cartSummary = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <p>Your cart is empty</p>
                        <a href="/products" class="btn btn-primary">Continue Shopping</a>
                    </div>
                `;
                cartSummary.style.display = 'none';
            } else {
                let html = '';
                let total = 0;
                
                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    html += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <h4>${item.name}</h4>
                                <p>Qty: ${item.qty}</p>
                            </div>
                            <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
                            <button class="btn-remove" onclick="removeFromCart(${index})">Remove</button>
                        </div>
                    `;
                });
                
                cartItems.innerHTML = html;
                document.querySelector('.total-amount').textContent = `$${total.toFixed(2)}`;
                cartSummary.style.display = 'block';
            }
            
            document.getElementById('cart-count').textContent = cart.length;
        }

        function removeFromCart(index) {
            const cart = JSON.parse(localStorage.getItem('solvraCart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('solvraCart', JSON.stringify(cart));
            loadCart();
        }

        function checkout() {
            alert('Checkout functionality would integrate with Shopify or payment gateway here.');
        }

        // Load cart on page load
        loadCart();
    </script>
</body>
</html>
